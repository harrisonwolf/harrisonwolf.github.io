<svg viewBox="0 0 980 500" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace,Menlo,Consolas,monospace" role="img" aria-labelledby="chart-title chart-desc">
<title id="chart-title">Fresh matched-case wall-time speedup</title>
<desc id="chart-desc">Four bars show Macaulay2 median external wall time divided by C++ median external wall time: 61.6, 21.4, 28.4, 29.3 times.</desc>
<rect width="980" height="500" fill="#FBFAF8"/>
<text x="34" y="34" fill="#1B1B17" font-size="17" font-weight="700">Fresh matched-case wall-time speedup</text>
<text x="34" y="55" fill="#6C685F" font-size="11.5">headline bundle 20260715T202630Z-b2a9bfb8-headline · ratio of case medians · 12/12 pairs successful</text>
<line x1="92" y1="390.0" x2="940" y2="390.0" stroke="#E7E4DC"/>
<text x="82" y="394.0" fill="#6C685F" font-size="11.5" text-anchor="end">0×</text>
<line x1="92" y1="347.1" x2="940" y2="347.1" stroke="#E7E4DC"/>
<text x="82" y="351.1" fill="#6C685F" font-size="11.5" text-anchor="end">10×</text>
<line x1="92" y1="304.3" x2="940" y2="304.3" stroke="#E7E4DC"/>
<text x="82" y="308.3" fill="#6C685F" font-size="11.5" text-anchor="end">20×</text>
<line x1="92" y1="261.4" x2="940" y2="261.4" stroke="#E7E4DC"/>
<text x="82" y="265.4" fill="#6C685F" font-size="11.5" text-anchor="end">30×</text>
<line x1="92" y1="218.6" x2="940" y2="218.6" stroke="#E7E4DC"/>
<text x="82" y="222.6" fill="#6C685F" font-size="11.5" text-anchor="end">40×</text>
<line x1="92" y1="175.7" x2="940" y2="175.7" stroke="#E7E4DC"/>
<text x="82" y="179.7" fill="#6C685F" font-size="11.5" text-anchor="end">50×</text>
<line x1="92" y1="132.9" x2="940" y2="132.9" stroke="#E7E4DC"/>
<text x="82" y="136.9" fill="#6C685F" font-size="11.5" text-anchor="end">60×</text>
<line x1="92" y1="90.0" x2="940" y2="90.0" stroke="#E7E4DC"/>
<text x="82" y="94.0" fill="#6C685F" font-size="11.5" text-anchor="end">70×</text>
<line x1="92" y1="90" x2="92" y2="390" stroke="#9C978C"/>
<line x1="92" y1="390" x2="940" y2="390" stroke="#9C978C"/>
<rect x="152" y="125.96" width="76" height="264.04" fill="#3C5A49"><title>61.6 times faster</title></rect>
<text x="190" y="116.0" fill="#1B1B17" font-size="13" font-weight="700" text-anchor="middle">61.6×</text>
<text x="190" y="419" fill="#1B1B17" font-size="11.5" text-anchor="middle">c = 3, d = 120</text>
<text x="190" y="437" fill="#6C685F" font-size="10.5" text-anchor="middle">280,840 candidates</text>
<rect x="352" y="298.16" width="76" height="91.84" fill="#3C5A49"><title>21.4 times faster</title></rect>
<text x="390" y="288.2" fill="#1B1B17" font-size="13" font-weight="700" text-anchor="middle">21.4×</text>
<text x="390" y="419" fill="#1B1B17" font-size="11.5" text-anchor="middle">c = 5, d = 45</text>
<text x="390" y="437" fill="#6C685F" font-size="10.5" text-anchor="middle">1,221,759 candidates</text>
<rect x="552" y="268.46" width="76" height="121.54" fill="#3C5A49"><title>28.4 times faster</title></rect>
<text x="590" y="258.5" fill="#1B1B17" font-size="13" font-weight="700" text-anchor="middle">28.4×</text>
<text x="590" y="419" fill="#1B1B17" font-size="11.5" text-anchor="middle">c = 6, d = 32</text>
<text x="590" y="437" fill="#6C685F" font-size="10.5" text-anchor="middle">906,192 candidates</text>
<rect x="752" y="264.35" width="76" height="125.65" fill="#3C5A49"><title>29.3 times faster</title></rect>
<text x="790" y="254.3" fill="#1B1B17" font-size="13" font-weight="700" text-anchor="middle">29.3×</text>
<text x="790" y="419" fill="#1B1B17" font-size="11.5" text-anchor="middle">c = 7, d = 24</text>
<text x="790" y="437" fill="#6C685F" font-size="10.5" text-anchor="middle">346,104 candidates</text>
<text x="516" y="475" fill="#6C685F" font-size="11.5" text-anchor="middle">machine- and case-scoped medians; not a universal speedup</text>
</svg>
